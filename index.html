<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TopJoy League</title>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:Arial;
}

header {
  background:#111821;
  padding:20px;
  display:flex;
  justify-content:space-between;
}

.logo {
  font-size:28px;
  font-weight:bold;
  color:#ff5a5a;
}

.container {
  width:90%;
  margin:auto;
}

.box {
  background:#161c23;
  padding:20px;
  margin:20px 0;
  border-radius:10px;
}

.match {
  background:#0f141a;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

button {
  background:#ff5a5a;
  border:none;
  padding:10px 15px;
  color:white;
  cursor:pointer;
}

input {
  padding:10px;
  margin:5px 0;
  width:100%;
  background:#0f141a;
  border:none;
  color:white;
}
</style>

</head>

<body>

<header>
  <div class="logo">🔥 TopJoy League</div>
  <a href="https://discord.gg/BKbxhe7cyB" target="_blank">
    <button>Discord</button>
  </a>
</header>

<div class="container">

  <div class="box">
    <h2>Nadchodzące mecze</h2>
    <div id="matches"></div>
  </div>

  <div class="box">
    <h2>Admin panel</h2>

    <input id="pass" placeholder="Hasło admina">
    <button onclick="login()">Zaloguj</button>

    <div id="admin" style="display:none;">
      <input id="teamA" placeholder="Drużyna A">
      <input id="teamB" placeholder="Drużyna B">
      <input id="date" placeholder="Data">
      <input id="time" placeholder="Godzina">

      <button onclick="addMatch()">Dodaj mecz</button>
    </div>

  </div>

</div>

<script>

let password = "1234";
let logged = false;

let matches = JSON.parse(localStorage.getItem("matches")) || [];

function render() {
  let html = "";
  matches.forEach(m => {
    html += `
      <div class="match">
        <div>${m.date} ${m.time}</div>
        <div>${m.teamA} vs ${m.teamB}</div>
      </div>
    `;
  });
  document.getElementById("matches").innerHTML = html;
}

function login() {
  let p = document.getElementById("pass").value;
  if (p === password) {
    logged = true;
    document.getElementById("admin").style.display = "block";
    alert("Zalogowano");
  } else {
    alert("Złe hasło");
  }
}

function addMatch() {
  if (!logged) return;

  let match = {
    teamA: document.getElementById("teamA").value,
    teamB: document.getElementById("teamB").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value
  };

  matches.push(match);
  localStorage.setItem("matches", JSON.stringify(matches));

  render();
}

render();

</script>

</body>
</html>
