<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Result - TopJoy League</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f14;
      color: white;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #111;
    }

    .btn {
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .main { background: orange; }
    .danger { background: red; color: white; }
    .edit { background: #444; color: white; }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .match {
      background: #111827;
      padding: 15px;
      border-radius: 12px;
      margin: 10px 0;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<div class="nav">
  <div>🔥 TopJoy League</div>
  <div>
    <a href="index.html"><button class="btn">Home</button></a>
    <a href="druzyny.html"><button class="btn">Drużyny</button></a>
    <a href="tabela.html"><button class="btn">Tabela</button></a>
  </div>
</div>

<div class="container">

  <h2>Result (wyniki)</h2>

  <div id="loginBox">
    <input id="pass" placeholder="Hasło admina">
    <button class="btn main" onclick="login()">Zaloguj</button>
  </div>

  <div id="admin" style="display:none;">
    <h3>Edycja meczu</h3>

    <input id="teamA">
    <input id="teamB">
    <input id="date">
    <input id="time">

    <input id="scoreA" placeholder="Score A">
    <input id="scoreB" placeholder="Score B">

    <select id="status">
      <option value="finished">Zakończony</option>
      <option value="upcoming">Cofnij do nadchodzących</option>
    </select>

    <button class="btn main" onclick="saveMatch()">Zapisz</button>
    <button class="btn" onclick="cancelEdit()">Anuluj</button>
  </div>

  <div id="results"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  query,
  orderBy,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTpluyfsidiEXOFkJ0H4nlN0dZdftk8e0",
  authDomain: "topjoy-league.firebaseapp.com",
  projectId: "topjoy-league",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let matches = [];
let logged = false;
let editingId = null;

window.login = function() {
  if (document.getElementById("pass").value === "2312") {
    logged = true;
    document.getElementById("admin").style.display = "block";
    document.getElementById("loginBox").style.display = "none";
    render();
  }
};

function render() {
  const box = document.getElementById("results");

  const finished = matches.filter(m => m.status === "finished");

  box.innerHTML = finished.map(m => `
    <div class="match">
      <b>${m.teamA} vs ${m.teamB}</b><br>
      ${m.scoreA}:${m.scoreB} | ${m.date} ${m.time}
      
      ${logged ? `
        <br><br>
        <button class="btn edit" onclick="edit('${m.id}')">Edytuj</button>
        <button class="btn danger" onclick="remove('${m.id}')">Usuń</button>
      ` : ""}
    </div>
  `).join("");
}

window.remove = async function(id) {
  if (!logged) return;
  await deleteDoc(doc(db, "mecze", id));
};

window.edit = function(id) {
  const m = matches.find(x => x.id === id);
  editingId = id;

  document.getElementById("teamA").value = m.teamA;
  document.getElementById("teamB").value = m.teamB;
  document.getElementById("date").value = m.date;
  document.getElementById("time").value = m.time;
  document.getElementById("scoreA").value = m.scoreA;
  document.getElementById("scoreB").value = m.scoreB;
  document.getElementById("status").value = m.status;
};

window.saveMatch = async function() {
  if (!editingId) return;

  await updateDoc(doc(db, "mecze", editingId), {
    teamA: document.getElementById("teamA").value,
    teamB: document.getElementById("teamB").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    scoreA: document.getElementById("scoreA").value,
    scoreB: document.getElementById("scoreB").value,
    status: document.getElementById("status").value
  });

  editingId = null;
};

window.cancelEdit = function() {
  editingId = null;
};

onSnapshot(query(collection(db, "mecze"), orderBy("createdAt", "desc")), (snap) => {
  matches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
});
</script>

</body>
</html>
